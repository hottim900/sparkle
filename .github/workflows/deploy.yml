name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  # Set SPARKLE_DIR in GitHub repo Settings → Variables and Secrets → Variables
  SPARKLE_DIR: ${{ vars.SPARKLE_DIR || '/opt/sparkle' }}

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Pull latest code
        run: cd $SPARKLE_DIR && git fetch origin main && git checkout main && git pull --ff-only origin main

      - name: Install dependencies
        run: cd $SPARKLE_DIR && npm ci

      - name: Build frontend
        run: cd $SPARKLE_DIR && npm run build

      - name: Validate migrations against production DB
        run: |
          cd $SPARKLE_DIR
          timeout 10 node --env-file=.env --import tsx -e "
            import './server/db/index.js';
            console.log('Migration validation passed');
            process.exit(0);
          " || {
            echo '❌ Migration validation failed — aborting deploy (old service still running)'
            exit 1
          }

      - name: Restart service
        run: sudo systemctl restart sparkle

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            sleep 2
            if curl -sf http://localhost:3000/api/health; then
              echo "Deploy successful — health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
          done
          echo "Health check failed after 5 attempts"
          exit 1
